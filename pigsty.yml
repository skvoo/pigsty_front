---
#==============================================================#
# File      :   meta.yml
# Desc      :   Pigsty default 1-node online install config
# Ctime     :   2020-05-22
# Mtime     :   2026-01-22
# Docs      :   https://pigsty.io/docs/conf/meta
# License   :   Apache-2.0 @ https://pigsty.io/docs/about/license/
# Copyright :   2018-2026  Ruohang Feng / Vonng (rh@vonng.com)
#==============================================================#

# This is the default 1-node configuration template, with:
# INFRA, NODE, PGSQL, ETCD, MINIO, DOCKER, APP (pgadmin)
# with basic pg extensions: postgis, pgvector
#
# Work with PostgreSQL 14-18 on all supported platform
# Usage:
#   curl https://repo.pigsty.io/get | bash
#   ./configure
#   ./deploy.yml

all:

  #==============================================================#
  # Clusters, Nodes, and Modules
  #==============================================================#
  children:

    #----------------------------------------------#
    # PGSQL : https://pigsty.io/docs/pgsql
    #----------------------------------------------#
    # this is an example single-node postgres cluster with pgvector installed, with one biz database & two biz users
    pg-meta:
      hosts:
        104.223.25.234: { pg_seq: 1, pg_role: primary } # <---- primary instance with read-write capability
        #x.xx.xx.xx: { pg_seq: 2, pg_role: replica } # <---- read only replica for read-only online traffic
        #x.xx.xx.xy: { pg_seq: 3, pg_role: offline } # <---- offline instance of ETL & interactive queries
      vars:
        pg_cluster: pg-meta

        # install, load, create pg extensions: https://pigsty.io/docs/pgsql/ext/
        pg_extensions: [ postgis, pgvector ]

        # define business users/roles : https://pigsty.io/docs/pgsql/config/user
        pg_users:
          - { name: dbuser_meta ,password: Snmq1wst8FRv1dTUjsBLnDsY   ,pgbouncer: true ,roles: [dbrole_admin   ] ,comment: pigsty admin user }
          - { name: dbuser_view ,password: WxtKYa2bYlSgv9uiy7OyBmzj ,pgbouncer: true ,roles: [dbrole_readonly] ,comment: read-only viewer  }
          - { name: dbuser_app  ,password: AppTest7x9Kp2mNqR        ,pgbouncer: true ,roles: [dbrole_readwrite] ,comment: frontend app (news)" }
          - { name: supabase_admin ,password: SupaAdmin7mN2pQ4r     ,pgbouncer: true ,roles: [dbrole_admin] ,comment: Supabase Studio external Postgres ,superuser: true ,createdb: true ,createrole: true }
          - { name: supabase_auth_admin ,password: SupaAdmin7mN2pQ4r ,pgbouncer: true ,roles: [dbrole_admin] ,comment: GoTrue Auth (Supabase Auth API) — тот же пароль, что в POSTGRES_PASSWORD }
          - { name: void ,password: Void7xKp9mNq2R                 ,pgbouncer: true ,roles: [dbrole_readwrite] ,comment: user Void }
          - { name: tdadmin ,password: TdAdmin7xKp2mNqR            ,pgbouncer: true ,roles: [dbrole_admin]    ,comment: TD admin, Vercel integration }

        # define business databases : https://pigsty.io/docs/pgsql/config/db
        pg_databases:
          - name: meta
            baseline: cmdb.sql
            comment: "pigsty meta database"
            schemas: [pigsty]
            # define extensions in database : https://pigsty.io/docs/pgsql/ext/create
            extensions: [ postgis, vector ]
          - name: app
            comment: "Frontend test / news app"
          - name: supabase
            comment: "Supabase Studio analytics (Logflare)"
          - name: td
            comment: "TD app, Vercel integration"
          # Целевые БД для миграции с Supabase Cloud: GD-lounge, imperial
          - name: gdloungedb
            comment: "Миграция из Supabase Cloud — GD-lounge"
          - name: imperialdb
            comment: "Миграция из Supabase Cloud — imperial"

        pg_hba_rules:   # https://pigsty.io/docs/pgsql/config/hba
          - { user: all ,db: all ,addr: 172.17.0.0/16 ,auth: pwd ,title: 'Docker network (Supabase containers)' ,order: 50 }
          - { user: all ,db: all ,addr: intra ,auth: pwd ,title: 'everyone intranet access with password' ,order: 800 }
        # PgBouncer (6432): сейчас открыто для теста (addr: world). План: DENY ALL + allowlist —
        # убрать world, прописать только доверенные IP (бэкенды, админ). См. docs/PLAN-SERVER-104.md §4.
        pgb_hba_rules:
          - { user: dbuser_app ,db: app ,addr: world ,auth: pwd ,title: 'app user from internet (e.g. Vercel) — тест, потом allowlist' ,order: 100 }
          - { user: void ,db: all ,addr: world ,auth: pwd ,title: 'void from internet' ,order: 101 }
          - { user: tdadmin ,db: td ,addr: world ,auth: pwd ,title: 'TDAdmin from Vercel' ,order: 102 }
        pg_crontab:     # https://pigsty.io/docs/pgsql/admin/crontab
          - '00 01 * * * /pg/bin/pg-backup full'

        # define (OPTIONAL) L2 VIP that bind to primary
        #pg_vip_enabled: true
        #pg_vip_address: 10.10.10.2/24
        #pg_vip_interface: eth1


    #----------------------------------------------#
    # INFRA : https://pigsty.io/docs/infra
    #----------------------------------------------#
    infra:
      hosts:
        104.223.25.234: { infra_seq: 1 }
      vars:
        repo_enabled: false   # disable in 1-node mode :  https://pigsty.io/docs/infra/admin/repo
        #repo_extra_packages: [ pg18-main ,pg18-time ,pg18-gis ,pg18-rag ,pg18-fts ,pg18-olap ,pg18-feat ,pg18-lang ,pg18-type ,pg18-util ,pg18-func ,pg18-admin ,pg18-stat ,pg18-sec ,pg18-fdw ,pg18-sim ,pg18-etl]

    #----------------------------------------------#
    # ETCD : https://pigsty.io/docs/etcd
    #----------------------------------------------#
    etcd:
      hosts:
        104.223.25.234: { etcd_seq: 1 }
      vars:
        etcd_cluster: etcd
        etcd_safeguard: false             # prevent purging running etcd instance?

    #----------------------------------------------#
    # Мониторинг: внешние серверы (только node_exporter + регистрация в Prometheus)
    # Запуск: ./node.yml -l monitored_nodes -t node_exporter,node_register
    #----------------------------------------------#
    monitored_nodes:
      hosts:
        172.245.64.199: { node_seq: 2, ansible_user: root }   # n8n (вход по ключу root)
        107.175.134.104: { node_seq: 3, ansible_user: root }  # password server (вход по ключу root)
      vars:
        node_exporter_enabled: true
        node_register_enabled: true

    #----------------------------------------------#
    # MINIO : https://pigsty.io/docs/minio (S3-совместимое хранилище для TD и др.)
    #----------------------------------------------#
    minio:
      hosts:
        104.223.25.234: { minio_seq: 1 }
      vars:
        minio_cluster: minio
        minio_https: false                    # Пока нет домена — HTTP по IP; когда будет домен: true + minio_domain, затем ./minio.yml -l minio
        minio_buckets:
          - { name: pgsql }
          - { name: meta, versioning: true }
          - { name: data }
          - { name: td-tickets }              # бакет для загрузки файлов тикетов (TD)
          # Миграция Supabase Storage → MinIO (GD-lounge, imperial)
          - { name: gd-lounge-assets }
          - { name: imperial-event-images }
          - { name: imperial-furniture-images }
          - { name: imperial-news-images }
          - { name: imperial-product-images }
          - { name: imperial-site-images }
        minio_users:
          - { access_key: pgbackrest  ,secret_key: ExKawoU1G31pfdXle5w1SWsM ,policy: pgsql }
          - { access_key: s3user_meta ,secret_key: NzSfDju53N8JKpAG8v7nNlGi   ,policy: meta  }
          - { access_key: s3user_data ,secret_key: 0NTHRj1minJLsvzFZAJiYq9V   ,policy: data  }
          - { access_key: s3user_td    ,secret_key: TdStorage7xKp2mNqR          ,policy: td-tickets }
          - { access_key: s3user_gdlounge   ,secret_key: GdLoungeStorage7xKp2mNqR   ,policy: gd-lounge-assets }
          - { access_key: s3user_imperial_ev ,secret_key: ImperialStorage7xKp2mNqR  ,policy: imperial-event-images }
          - { access_key: s3user_imperial_fu ,secret_key: ImperialStorage7xKp2mNqR  ,policy: imperial-furniture-images }
          - { access_key: s3user_imperial_nw ,secret_key: ImperialStorage7xKp2mNqR  ,policy: imperial-news-images }
          - { access_key: s3user_imperial_pr ,secret_key: ImperialStorage7xKp2mNqR  ,policy: imperial-product-images }
          - { access_key: s3user_imperial_si ,secret_key: ImperialStorage7xKp2mNqR  ,policy: imperial-site-images }

    #----------------------------------------------#
    # DOCKER : https://pigsty.io/docs/docker
    # APP    : https://pigsty.io/docs/app
    #----------------------------------------------#
    # launch example pgadmin app with: ./app.yml (http://104.223.25.234:8885 admin@pigsty.cc / pigsty)
    app:
      hosts: { 104.223.25.234: {} }
      vars:
        docker_enabled: true                # enabled docker with ./docker.yml
        #docker_registry_mirrors: ["https://docker.1panel.live","https://docker.1ms.run","https://docker.xuanyuan.me","https://registry-1.docker.io"]
        app: pgadmin                        # specify the default app name to be installed (in the apps)
        apps:                               # define all applications, appname: definition
          pgadmin:                          # pgadmin app definition (app/pgadmin -> /opt/pgadmin)
            conf:                           # override /opt/pgadmin/.env
              PGADMIN_DEFAULT_EMAIL: admin@pigsty.cc
              PGADMIN_DEFAULT_PASSWORD: pigsty
              # без этого при доступе по HTTP статика отдаётся с 302 → спиннер на странице входа
              PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: 'False'

    # Supabase Studio: ./docker.yml -l supabase && ./app.yml -l supabase → http://104.223.25.234:8000
    supabase:
      hosts: { 104.223.25.234: {} }
      vars:
        docker_enabled: true
        app: supabase
        apps:
          supabase:
            conf:
              JWT_SECRET: pigsty-supabase-jwt-secret-at-least-32-chars-long
              ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyAgCiAgICAicm9sZSI6ICJhbm9uIiwKICAgICJpc3MiOiAic3VwYWJhc2UtZGVtbyIsCiAgICAiaWF0IjogMTY0MTc2OTIwMCwKICAgICJleHAiOiAxNzk5NTM1NjAwCn0.dc_X5iR_VP_qT0zsiyj_I_OZ2T9FtRU2BBNWN8Bu4GE
              SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyAgCiAgICAicm9sZSI6ICJzZXJ2aWNlX3JvbGUiLAogICAgImlzcyI6ICJzdXBhYmFzZS1kZW1vIiwKICAgICJpYXQiOiAxNjQxNzY5MjAwLAogICAgImV4cCI6IDE3OTk1MzU2MDAKfQ.DaYlNEoUrrEn2Ig7tqibS-PHK5vgusbcbo7X36XVt4Q
              PG_META_CRYPTO_KEY: pigsty-pg-meta-crypto-key-32-chars!!
              DASHBOARD_USERNAME: void
              DASHBOARD_PASSWORD: V0id#xK9mQ
              LOGFLARE_PUBLIC_ACCESS_TOKEN: 1234567890abcdef1234567890abcdef
              LOGFLARE_PRIVATE_ACCESS_TOKEN: fedcba0987654321fedcba0987654321
              POSTGRES_HOST: 104.223.25.234
              POSTGRES_PORT: "5432"
              POSTGRES_DB: app
              POSTGRES_PASSWORD: SupaAdmin7mN2pQ4r
              SITE_URL: http://104.223.25.234:8000
              API_EXTERNAL_URL: http://104.223.25.234:8000
              SUPABASE_PUBLIC_URL: http://104.223.25.234:8000


  #==============================================================#
  # Global Parameters
  #==============================================================#
  vars:

    #----------------------------------------------#
    # INFRA : https://pigsty.io/docs/infra
    #----------------------------------------------#
    version: v4.0.0                   # pigsty version string
    admin_ip: 104.223.25.234             # admin node ip address
    region: default                   # upstream mirror region: default|china|europe
    proxy_env:                        # global proxy env when downloading packages
      no_proxy: "localhost,127.0.0.1,10.0.0.0/8,192.168.0.0/16,*.pigsty,*.aliyun.com,mirrors.*,*.myqcloud.com,*.tsinghua.edu.cn"
      # http_proxy:  # set your proxy here: e.g http://user:pass@proxy.xxx.com
      # https_proxy: # set your proxy here: e.g http://user:pass@proxy.xxx.com
      # all_proxy:   # set your proxy here: e.g http://user:pass@proxy.xxx.com
    infra_portal:                     # infra services exposed via portal
      home : { domain: i.pigsty }     # default domain name
      pgadmin : { domain: adm.pigsty ,endpoint: "${admin_ip}:8885" }
      supa   : { domain: supa.pigsty ,endpoint: "${admin_ip}:8000" ,websocket: true }

    nginx_users:
      admin: "dftg3434g##$%bgnDfvbgb"
    # Защита портала: HTTPS (см. docs/SECURITY-PORTAL.md)
    # nginx_sslmode: enable   # HTTPS на 443, HTTP на 80
    # nginx_sslmode: enforce  # редирект HTTP → HTTPS

    #----------------------------------------------#
    # NODE : https://pigsty.io/docs/node/param
    #----------------------------------------------#
    nodename_overwrite: false             # do not overwrite node hostname on single node mode
    node_tune: oltp                       # node tuning specs: oltp,olap,tiny,crit
    node_etc_hosts: [ '${admin_ip} i.pigsty sss.pigsty' ]
    node_repo_modules: 'node,infra,pgsql' # add these repos directly to the singleton node
    #node_repo_modules: local             # use this if you want to build & user local repo
    node_repo_remove: true                # remove existing node repo for node managed by pigsty
    #node_packages: [openssh-server]      # packages to be installed current nodes with the latest version

    #----------------------------------------------#
    # PGSQL : https://pigsty.io/docs/pgsql/param
    #----------------------------------------------#
    pg_version: 17                      # default postgres version
    pg_locale: C.UTF-8                  # overwrite default C local
    pg_lc_collate: C.UTF-8              # overwrite default C lc_collate
    pg_lc_ctype: C.UTF-8                # overwrite default C lc_ctype

    pg_conf: oltp.yml                   # pgsql tuning specs: {oltp,olap,tiny,crit}.yml
    pg_safeguard: false                 # prevent purging running postgres instance?
    pg_packages: [ pgsql-main, pgsql-common ]                 # pg kernel and common utils
    pgbouncer_enabled: true
    pgbackrest_method: local

    pgbackrest_repo:
      local:
        path: /pg/backup
 
   #pg_extensions: [ pg18-time ,pg18-gis ,pg18-rag ,pg18-fts ,pg18-olap ,pg18-feat ,pg18-lang ,pg18-type ,pg18-util ,pg18-func ,pg18-admin ,pg18-stat ,pg18-sec ,pg18-fdw ,pg18-sim ,pg18-etl]

    #----------------------------------------------#
    # BACKUP : https://pigsty.io/docs/pgsql/backup
    #----------------------------------------------#
    # if you want to use minio as backup repo instead of 'local' fs, uncomment this, and configure `pgbackrest_repo`
    # you can also use external object storage as backup repo
    #pgbackrest_method: minio          # if you want to use minio as backup repo instead of 'local' fs, uncomment this
    #pgbackrest_repo:                  # pgbackrest repo: https://pgbackrest.org/configuration.html#section-repository
    #  local:                          # default pgbackrest repo with local posix fs
    #    path: /pg/backup              # local backup directory, `/pg/backup` by default
    #    retention_full_type: count    # retention full backups by count
    #    retention_full: 2             # keep 2, at most 3 full backup when using local fs repo
    #  minio:                          # optional minio repo for pgbackrest
    #    type: s3                      # minio is s3-compatible, so s3 is used
    #    s3_endpoint: sss.pigsty       # minio endpoint domain name, `sss.pigsty` by default
    #    s3_region: us-east-1          # minio region, us-east-1 by default, useless for minio
    #    s3_bucket: pgsql              # minio bucket name, `pgsql` by default
    #    s3_key: pgbackrest            # minio user access key for pgbackrest
    #    s3_key_secret: ExKawoU1G31pfdXle5w1SWsM  # minio user secret key for pgbackrest
    #    s3_uri_style: path            # use path style uri for minio rather than host style
    #    path: /pgbackrest             # minio backup path, default is `/pgbackrest`
    #    storage_port: 9000            # minio port, 9000 by default
    #    storage_ca_file: /etc/pki/ca.crt  # minio ca file path, `/etc/pki/ca.crt` by default
    #    block: y                      # Enable block incremental backup
    #    bundle: y                     # bundle small files into a single file
    #    bundle_limit: 20MiB           # Limit for file bundles, 20MiB for object storage
    #    bundle_size: 128MiB           # Target size for file bundles, 128MiB for object storage
    #    cipher_type: aes-256-cbc      # enable AES encryption for remote backup repo
    #    cipher_pass: pgBackRest       # AES encryption password, default is 'pgBackRest'
    #    retention_full_type: time     # retention full backup by time on minio repo
    #    retention_full: 14            # keep full backup for last 14 days
    #  s3: # any s3 compatible service is fine
    #    type: s3
