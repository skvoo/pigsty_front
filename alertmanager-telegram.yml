---
# Alertmanager: критичные алерты в Telegram (все серверы: Pigsty, n8n, password server)
# 1) Создайте бота и канал (см. docs/ALERTS-TELEGRAM-BOT-CHANNEL.md)
# 2) Подставьте REPLACE_BOT_TOKEN и REPLACE_CHAT_ID
# 3) Скопируйте на сервер: sudo cp alertmanager-telegram.yml /etc/alertmanager.yml
# 4) sudo systemctl reload alertmanager

global:
  resolve_timeout: 5m

route:
  receiver: 'default'
  group_by: ['alertname', 'instance']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    # Критичные алерты (все ноды: 104.223.25.234, 172.245.64.199, 107.175.134.104) -> Telegram
    - receiver: 'telegram'
      matchers: [ level="0" ]
      group_wait: 10s
      repeat_interval: 1h

receivers:
  - name: 'default'

  - name: 'telegram'
    telegram_configs:
      - api_url: 'https://api.telegram.org'
        bot_token: 'REPLACE_BOT_TOKEN'
        chat_id: REPLACE_CHAT_ID   # число без кавычек! например -1003847875300
        send_resolved: true
        parse_mode: 'HTML'
        message: |
          {{ range .Alerts }}
          {{ if eq .Status "firing" }}🔴 <b>PROBLEM</b>{{ else }}🟢 <b>RESOLVED</b>{{ end }}
          <b>Alert:</b> {{ .Labels.alertname }}
          <b>Server:</b> {{ .Labels.ins }} ({{ .Labels.ip }})
          {{ .Annotations.summary }}
          {{ .Annotations.description }}
          —
          {{ end }}

inhibit_rules:
  - source_matchers: [ alertname="NodeDown" ]
    target_matchers: [ category="node" ]
    equal: ['ip']
